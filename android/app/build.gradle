plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and
    // Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.omnisoft.omni_hr"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_11
        targetCompatibility = JavaVersion.VERSION_11
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_11.toString()
    }

    defaultConfig {
        applicationId = "com.omnisoft.omni_hr"
        // camera + geolocator both require minSdk >= 21; we pin at 23
        // for safer runtime-permissions behaviour.
        minSdkVersion = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    buildTypes {
        release {
            // Signing with the debug keys for now so `flutter run --release`
            // still produces a runnable APK during development.
            signingConfig signingConfigs.debug
        }
    }

    // Don't compress the bundled .tflite face embedding model — TFLite
    // mmaps the asset at load time and compression breaks that.
    androidResources {
        noCompress 'tflite'
    }
}

flutter {
    source = "../.."
}
