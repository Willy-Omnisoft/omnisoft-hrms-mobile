name: omni_hr
description: Omni HR — Mobile attendance and leave management
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.3.0
  shared_preferences: ^2.5.0
  provider: ^6.1.0
  intl: ^0.20.0
  geolocator: ^14.0.2
  google_fonts: ^8.0.2
  table_calendar: ^3.1.3
  file_picker: ^10.0.0
  open_filex: ^4.5.0
  path_provider: ^2.1.5
  camera: ^0.11.0
  # camera_avfoundation 0.9.23+ uses iOS 18 SDK API surface
  # (AVCaptureSession.wasInterruptedNotification etc.) that doesn't
  # compile under Xcode 15 / iOS 17. Pin to a version that works on
  # current Xcode. Direct dep so the version isn't overridden by
  # camera's transitive resolution.
  camera_avfoundation: 0.9.18+9
  device_info_plus: ^11.5.0
  google_mlkit_face_detection: ^0.13.0
  tflite_flutter: ^0.11.0
  image: ^4.1.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
